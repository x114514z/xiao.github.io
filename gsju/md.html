<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 解析器</title>
    <script src="../qita/marked.min.js"></script>
</head>
<body>

    <h1>Markdown 解析器</h1>

    <div>
        <input type="file" id="fileInput" accept=".md,.markdown,.txt">
        <button onclick="document.getElementById('fileInput').click()">导入文件</button>
        <button onclick="pasteContent()">粘贴</button>
        <button onclick="clearContent()">清空</button>
    </div>

    <div id="container" style="display:flex;gap:10px;min-height:400px;">
        <textarea id="source" placeholder="在此输入 Markdown，或将 .md 文件拖拽至此..." style="flex:1;padding:10px;font-family:monospace;"></textarea>
        <div id="preview" style="flex:1;padding:10px;overflow-y:auto;border:1px solid #ccc;"></div>
    </div>

    <div id="toast" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;opacity:0;transition:opacity 0.3s;"></div>

    <script>
        const source = document.getElementById('source');
        const preview = document.getElementById('preview');
        const fileInput = document.getElementById('fileInput');
        const toast = document.getElementById('toast');

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        function render() {
            const md = source.value;
            if (!md.trim()) {
                preview.innerHTML = '等待输入...';
                return;
            }
            preview.innerHTML = marked.parse(md);
        }

        async function pasteContent() {
            try {
                const text = await navigator.clipboard.readText();
                source.value = text;
                render();
                showToast('已从剪贴板粘贴');
            } catch (err) {
                showToast('无法读取剪贴板');
            }
        }

        function clearContent() {
            if(confirm('确定要清空所有内容吗？')) {
                source.value = '';
                render();
                showToast('内容已清空');
            }
        }

        function handleFile(file) {
            if (!/\.(md|markdown|txt)$/i.test(file.name)) {
                showToast('仅支持 .md / .txt 文件');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                source.value = e.target.result;
                render();
                showToast('已加载: ' + file.name);
            };
            reader.readAsText(file);
        }

        let timeoutId;
        source.addEventListener('input', () => {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(render, 300);
        });

        ['dragenter', 'dragover'].forEach(e => {
            source.addEventListener(e, e => { e.preventDefault(); source.style.backgroundColor = '#e8f0fe'; });
        });
        ['dragleave', 'drop'].forEach(e => {
            source.addEventListener(e, e => { e.preventDefault(); source.style.backgroundColor = ''; });
        });
        source.addEventListener('drop', e => {
            const files = e.dataTransfer.files;
            if (files && files[0]) handleFile(files[0]);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) handleFile(fileInput.files[0]);
            fileInput.value = '';
        });

        const welcomeMsg = "# 欢迎使用 Markdown 解析器\n\n你可以在左侧输入 **Markdown**，右侧会实时显示。\n\n```javascript\nconsole.log('支持代码高亮样式！');\n```\n\n- 支持拖拽文件上传\n- 支持实时预览";
        source.value = welcomeMsg;
        render();
    </script>
</body>
</html>
