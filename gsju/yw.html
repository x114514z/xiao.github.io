<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode 偏移转换</title>
</head>
<body>

    <h1>偏移转换 0x1DCBA</h1>

    <div>
        <h3>正向转换 (原码 + 0x1DCBA)</h3>
        <textarea id="forwardInput" placeholder="输入原始文字..." rows="3" cols="50"></textarea>
        <div>
            <button id="forwardBtn">执行转换</button>
            <button id="copyForward">复制结果</button>
        </div>
        <div id="forwardOutput" style="border:1px solid #ccc;padding:10px;min-height:30px;margin-top:10px;"></div>
        <table border="1" style="width:100%;margin-top:10px;border-collapse:collapse;">
            <thead><tr><th>原</th><th>新码点</th><th>新</th></tr></thead>
            <tbody id="forwardTbody"></tbody>
        </table>
    </div>

    <hr>

    <div>
        <h3>反向还原 (码点 - 0x1DCBA)</h3>
        <textarea id="reverseInput" placeholder="粘贴偏移后的字符..." rows="3" cols="50"></textarea>
        <div>
            <button id="reverseBtn">执行还原</button>
            <button id="copyReverse">复制结果</button>
        </div>
        <div id="reverseOutput" style="border:1px solid #ccc;padding:10px;min-height:30px;margin-top:10px;"></div>
        <table border="1" style="width:100%;margin-top:10px;border-collapse:collapse;">
            <thead><tr><th>偏</th><th>还原码点</th><th>原</th></tr></thead>
            <tbody id="reverseTbody"></tbody>
        </table>
    </div>

    <p>偏移量固定 0x1DCBA (122554) | 新字符可能由于字体覆盖问题显示为 □</p>

    <script>
        const OFFSET = 0x1DCBA;
        const MAX_CODEPOINT = 0x10FFFF;

        function processText(inputId, outputId, tbodyId, isForward) {
            const text = document.getElementById(inputId).value;
            const chars = [...text];
            let results = [];
            let displayChars = [];

            chars.forEach(ch => {
                const oldCode = ch.codePointAt(0);
                const newCode = isForward ? oldCode + OFFSET : oldCode - OFFSET;
                let newChar = '';

                if (newCode >= 0 && newCode <= MAX_CODEPOINT) {
                    try { newChar = String.fromCodePoint(newCode); } catch { newChar = '❌'; }
                } else {
                    newChar = '⚠️';
                }

                displayChars.push(newChar);
                results.push('<tr><td>' + (ch === ' ' ? '␣' : ch) + '</td><td>U+' + newCode.toString(16).toUpperCase() + '</td><td>' + newChar + '</td></tr>');
            });

            document.getElementById(outputId).textContent = displayChars.join('');
            document.getElementById(tbodyId).innerHTML = results.join('');
        }

        document.getElementById('forwardBtn').onclick = () => processText('forwardInput', 'forwardOutput', 'forwardTbody', true);
        document.getElementById('reverseBtn').onclick = () => processText('reverseInput', 'reverseOutput', 'reverseTbody', false);

        function setupCopy(btnId, targetId) {
            document.getElementById(btnId).onclick = () => {
                const text = document.getElementById(targetId).textContent;
                if (!text) return;
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.getElementById(btnId);
                    const originalText = btn.innerText;
                    btn.innerText = '已复制！';
                    setTimeout(() => btn.innerText = originalText, 1500);
                });
            };
        }
        setupCopy('copyForward', 'forwardOutput');
        setupCopy('copyReverse', 'reverseOutput');

        window.onload = () => {
            document.getElementById('forwardInput').value = '教你写殄文';
            processText('forwardInput', 'forwardOutput', 'forwardTbody', true);
        };
    </script>
</body>
</html>
