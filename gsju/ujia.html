<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode码点与字符转换工具</title>
</head>
<body>

    <h1>Unicode 码点与字符转换器</h1>
    <p>输入Unicode码点（如 U+4E2D）或字符（如 😊），实时获取转换结果</p>

    <div>
        <label for="input">输入 Unicode 码点或字符：</label>
        <input type="text" id="input" placeholder="例如: U+4E2D 或 😊 或 中" autocomplete="off">
        <div>
            <p>试试这些例子：</p>
            <button onclick="document.getElementById('input').value='U+4E2D';convert()">U+4E2D (中)</button>
            <button onclick="document.getElementById('input').value='U+1F600';convert()">U+1F600 (😀)</button>
            <button onclick="document.getElementById('input').value='U+200B';convert()">U+200B (零宽空格)</button>
            <button onclick="document.getElementById('input').value='😊';convert()">😊 (笑脸)</button>
            <button onclick="document.getElementById('input').value='🍎';convert()">🍎 (苹果)</button>
            <button onclick="document.getElementById('input').value='A';convert()">A (字母A)</button>
        </div>
    </div>

    <div id="output">
        <p>输入Unicode码点或字符，查看转换结果</p>
    </div>

    <script>
        function convert() {
            let inputEl = document.getElementById('input');
            let val = inputEl.value.trim();
            const output = document.getElementById('output');

            if (!val) {
                output.innerHTML = '<p>输入Unicode码点或字符，查看转换结果</p>';
                return;
            }

            let hex, code, char;

            if (/^(U\+)?[0-9A-Fa-f]{4,6}$/.test(val)) {
                hex = val.replace(/^U\+/, '').toUpperCase();
                code = parseInt(hex, 16);
                if (isNaN(code) || code > 0x10FFFF) {
                    output.innerHTML = '<p>❌ 无效的码点</p>';
                    return;
                }
                char = String.fromCodePoint(code);
            } else {
                code = val.codePointAt(0);
                hex = code.toString(16).toUpperCase();
                char = Array.from(val)[0];
            }

            let display = char;
            let invisibleNote = '';

            if (char.trim() === '' && char.length > 0) {
                display = '□';
                invisibleNote = '（不可见字符）';
            }

            output.innerHTML = `
                <div><strong>${display}</strong> ${invisibleNote}</div>
                <div>Unicode 码点: U+${hex.padStart(4, '0')} <button onclick="navigator.clipboard.writeText('U+${hex.padStart(4, '0')}')">复制</button></div>
                <div>十进制码点: ${code} <button onclick="navigator.clipboard.writeText('${code}')">复制</button></div>
                <div>字符名称: ${getCharacterName(code)}</div>
                <div>Unicode 版本: ${getUnicodeVersion(code)}</div>
            `;
        }

        function getCharacterName(code) {
            const specialChars = {
                0x4E2D: "CJK统一汉字-中",
                0x1F600: "表情符号-笑脸",
                0x1F60A: "表情符号-微笑笑脸",
                0x1F34E: "表情符号-红苹果",
                0x200B: "零宽空格",
                0x20: "空格",
                0xA: "换行符",
                0x9: "制表符",
                0x41: "拉丁大写字母A",
                0x61: "拉丁小写字母A"
            };
            return specialChars[code] || "未知字符";
        }

        function getUnicodeVersion(code) {
            if (code <= 0xFFFF) return "1.0.0 (基本多文种平面)";
            if (code <= 0x1FFFF) return "2.0+ (增补多文种平面)";
            if (code <= 0x2FFFF) return "3.0+ (增补表意文字平面)";
            if (code <= 0xDFFFF) return "保留区域";
            if (code <= 0xEFFFF) return "特殊用途区";
            if (code <= 0x10FFFF) return "3.1+ (私人使用区及增补字符)";
            return "无效码点";
        }

        document.addEventListener('DOMContentLoaded', function() {
            const inputEl = document.getElementById('input');
            inputEl.addEventListener('input', convert);
            inputEl.addEventListener('keyup', function(event) {
                if (event.key === 'Enter') convert();
            });
            inputEl.focus();
        });
    </script>
</body>
</html>
