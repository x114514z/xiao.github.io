<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML/CSS 预览器</title>
</head>
<body>

    <h1>在线 HTML/CSS 实时预览器</h1>
    <p>输入您的 HTML/CSS 代码，点击"运行代码"按钮进行预览</p>

    <div style="display:flex;gap:10px;min-height:300px;">
        <div style="flex:1;display:flex;flex-direction:column;">
            <textarea id="codeInput" placeholder="在此输入 HTML/CSS 代码..." style="flex:1;padding:10px;font-family:monospace;margin-bottom:10px;"></textarea>
            <button id="runButton">运行代码</button>
        </div>
        <div style="flex:1;border:1px solid #ccc;padding:10px;overflow:auto;" id="previewOutput">
            <p>点击"运行代码"按钮查看结果。</p>
        </div>
    </div>

    <script>
        const codeInput = document.getElementById('codeInput');
        const previewOutput = document.getElementById('previewOutput');
        const runButton = document.getElementById('runButton');

        function updatePreview() {
            previewOutput.innerHTML = codeInput.value;
        }

        runButton.addEventListener('click', updatePreview);

        codeInput.value = `
<h3>这是一个示例标题</h3>
<p>点击"运行代码"按钮后更新！</p>
<button style="background:#007bff;color:white;border:none;padding:10px 20px;cursor:pointer;">按钮</button>
        `.trim();
    </script>
</body>
</html>
